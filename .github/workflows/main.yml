    # 4. البحث التلقائي عن مجلد المشروع، إصلاح الـ wrapper، وبناء الـ APK
    - name: Build Debug APK
      run: |
        # البحث عن الملف المسؤول عن إعدادات المشروع
        SETTINGS_FILE=$(find . -name "settings.gradle.kts" -o -name "settings.gradle" | head -n 1)
        
        if [ -z "$SETTINGS_FILE" ]; then
          echo "Error: Android project settings file not found in repository!"
          exit 1
        fi
        
        # استخراج مسار المجلد الحقيقي والتحويل إليه
        PROJECT_DIR=$(dirname "$SETTINGS_FILE")
        echo "Successfully found Android project directory at: $PROJECT_DIR"
        cd "$PROJECT_DIR"
        
        # توليد ملف wrapper سليم وجديد 100% لتجاوز أي ملف تالف
        gradle wrapper
        chmod +x gradlew
        ./gradlew assembleDebug

    # 5. رفع ملف الـ APK الناتج كـ Artifact
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pharmacy-app-debug-apk
        path: |
          **/build/outputs/apk/debug/*-debug.apk
