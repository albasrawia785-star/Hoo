name: Android CI/CD - Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. جلب الكود من المستودع
    - name: Checkout the code
      uses: actions/checkout@v4

    # 2. إعداد بيئة جافا
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    # 3. إعداد أداة Gradle الرسمية في السيرفر لتوليد الـ wrapper السليم
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # 4. إصلاح الملف التالف وبناء الـ APK من داخل مجلد المشروع
    - name: Build Debug APK
      run: |
        cd project
        # أمر ذكي لإعادة بناء وتوليد ملف gradle-wrapper.jar سليم 100% وتجاوز التالف
        gradle wrapper
        chmod +x gradlew
        ./gradlew assembleDebug

    # 5. رفع ملف الـ APK الناتج كـ Artifact
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pharmacy-app-debug-apk
        path: |
          **/build/outputs/apk/debug/*-debug.apk
